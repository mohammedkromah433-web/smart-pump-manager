<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Pump Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .status-WORKING { color: #198754; font-weight: bold; }
        .status-BROKEN { color: #dc3545; font-weight: bold; }
        .status-MAINTENANCE { color: #fd7e14; font-weight: bold; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .card { border-radius: 12px; }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">🚰 Smart Pump Manager Pro</h1>
            <p class="text-muted">Real-time infrastructure monitoring & maintenance</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-success" onclick="downloadCSV()">📊 Export CSV</button>
            <button class="btn btn-primary" onclick="openAddModal()">+ New Pump</button>
            <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#addTechModal">+ New Tech</button>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span class="fw-bold">Pump Network Status</span>
                    <input type="text" id="search-input" class="form-control form-control-sm w-50" placeholder="Search by name or location..." onkeyup="filterPumps()">
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr><th>ID</th><th>Name</th><th>Location</th><th>Status</th><th>Flow</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="pump-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white fw-bold">Schedule Repair Task</div>
                <div class="card-body">
                    <form id="assign-form" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Pump</label>
                            <select id="pump-select" class="form-select" required></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Technician</label>
                            <select id="tech-select" class="form-select" required></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Work Description</label>
                            <input type="text" id="work-desc" class="form-control" placeholder="e.g. Inspect motor" required>
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-success px-4">Assign Task</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-info text-white fw-bold">Flow Rate Analytics</div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="flowChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white fw-bold">Critical Alerts</div>
                <div class="card-body" id="alerts-container">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="pumpModal" tabindex="-1">
    <div class="modal-dialog">
        <form class="modal-content" id="pump-form">
            <div class="modal-header"><h5 id="modalTitle" class="fw-bold">Add New Pump</h5></div>
            <div class="modal-body">
                <input type="hidden" id="p-id">
                <label class="form-label small">Name</label>
                <input type="text" id="p-name" class="form-control mb-2" required>
                <label class="form-label small">Location</label>
                <input type="text" id="p-loc" class="form-control mb-2" required>
                <label class="form-label small">Model Number</label>
                <input type="text" id="p-model" class="form-control mb-2" required>
                <label class="form-label small">Initial Flow Rate (L/min)</label>
                <input type="number" id="p-flow" class="form-control mb-2" step="0.1" required>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="addTechModal" tabindex="-1">
    <div class="modal-dialog">
        <form class="modal-content" id="tech-form">
            <div class="modal-header"><h5 class="fw-bold">Register Technician</h5></div>
            <div class="modal-body">
                <input type="text" id="t-name" class="form-control mb-2" placeholder="Full Name" required>
                <input type="text" id="t-spec" class="form-control mb-2" placeholder="Specialization" required>
                <input type="text" id="t-phone" class="form-control mb-2" placeholder="Phone Number" required>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-secondary w-100">Save Technician</button></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let allPumps = [];
    let flowChart;
    const pumpModal = new bootstrap.Modal(document.getElementById('pumpModal'));

    window.onload = () => { loadPumps(); loadTechnicians(); };

    async function loadPumps() {
        const res = await fetch('/api/pumps');
        allPumps = await res.json();
        renderTable(allPumps);
        updateChart(allPumps);
        updateUIElements(allPumps);
    }

    function renderTable(data) {
        const body = document.getElementById('pump-table-body');
        body.innerHTML = data.map(p => `
            <tr>
                <td><span class="badge bg-light text-dark">${p.id}</span></td>
                <td>${p.name}</td>
                <td>${p.location}</td>
                <td><span class="status-${p.status}">${p.status}</span></td>
                <td>${p.flowRate} <small>L/min</small></td>
                <td>
                    <div class="btn-group">
                        ${p.status === 'BROKEN' ? `<button class="btn btn-sm btn-success" onclick="fixPump(${p.id})">Fix</button>` : ''}
                        <button class="btn btn-sm btn-outline-warning" onclick='openEditModal(${JSON.stringify(p)})'>Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deletePump(${p.id})">Del</button>
                    </div>
                </td>
            </tr>`).join('');
    }

    // Modal Handling
    function openAddModal() {
        document.getElementById('pump-form').reset();
        document.getElementById('p-id').value = '';
        document.getElementById('modalTitle').innerText = "Add New Pump";
        pumpModal.show();
    }

    function openEditModal(pump) {
        document.getElementById('p-id').value = pump.id;
        document.getElementById('p-name').value = pump.name;
        document.getElementById('p-loc').value = pump.location;
        document.getElementById('p-model').value = pump.modelNo;
        document.getElementById('p-flow').value = pump.flowRate;
        document.getElementById('modalTitle').innerText = "Update Pump #" + pump.id;
        pumpModal.show();
    }

    // CRUD Logic
    document.getElementById('pump-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('p-id').value;
        const pumpData = {
            name: document.getElementById('p-name').value,
            location: document.getElementById('p-loc').value,
            modelNo: document.getElementById('p-model').value,
            flowRate: parseFloat(document.getElementById('p-flow').value)
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/pumps/${id}` : '/api/pumps';

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(pumpData)
        });
        pumpModal.hide();
        loadPumps();
    };

    async function deletePump(id) {
        if(confirm("Permanently delete this pump from the network?")) {
            await fetch(`/api/pumps/${id}`, { method: 'DELETE' });
            loadPumps();
        }
    }

    async function fixPump(id) {
        await fetch(`/api/pumps/${id}/fix`, { method: 'PUT' });
        loadPumps();
    }

    // CSV Export Logic
    function downloadCSV() {
        if (!allPumps.length) return alert("No data to export");
        const headers = ["ID", "Name", "Location", "Status", "Flow Rate"];
        const rows = allPumps.map(p => [p.id, `"${p.name}"`, `"${p.location}"`, p.status, p.flowRate]);
        const content = [headers, ...rows].map(e => e.join(",")).join("\n");
        const blob = new Blob([content], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Pump_Report_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    // Chart & UI Update Logic
    function updateChart(data) {
        const ctx = document.getElementById('flowChart').getContext('2d');
        if(flowChart) flowChart.destroy();
        flowChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(p => p.name),
                datasets: [{
                    label: 'Flow Rate (L/min)',
                    data: data.map(p => p.flowRate),
                    backgroundColor: data.map(p => p.status === 'BROKEN' ? '#dc3545' : '#198754')
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function filterPumps() {
        const q = document.getElementById('search-input').value.toLowerCase();
        renderTable(allPumps.filter(p => p.name.toLowerCase().includes(q) || p.location.toLowerCase().includes(q)));
    }

    async function loadTechnicians() {
        const res = await fetch('/api/technicians');
        const data = await res.json();
        document.getElementById('tech-select').innerHTML = data.map(t => `<option value="${t.id}">${t.name} (${t.specialization})</option>`).join('');
    }

    function updateUIElements(data) {
        document.getElementById('pump-select').innerHTML = data.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        const broken = data.filter(p => p.status === 'BROKEN');
        document.getElementById('alerts-container').innerHTML = broken.length ?
            broken.map(p => `<div class="alert alert-danger py-2 mb-2 small">⚠️ <b>${p.name}</b> failure in ${p.location}</div>`).join('') :
            '<div class="text-success small">✅ All systems normal.</div>';
    }

    // Assignment logic
    document.getElementById('assign-form').onsubmit = async (e) => {
        e.preventDefault();
        const pId = document.getElementById('pump-select').value;
        const tId = document.getElementById('tech-select').value;
        const desc = document.getElementById('work-desc').value;
        await fetch(`/api/pumps/${pId}/assign/${tId}?description=${encodeURIComponent(desc)}`, { method: 'POST' });
        alert("Maintenance task created!");
        loadPumps();
        document.getElementById('assign-form').reset();
    };
</script>
</body>
</html>
