# --- DATABASE CONNECTION ---
# Use Environment Variables for production, fallback to local for development
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/smart_pump_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
# 'update' will create tables automatically if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SERVER CONFIG ---
server.port=${PORT:8080}

# --- SECURITY ---
# Optional: Ensure sessions are managed correctly
server.servlet.session.timeout=30m